name: CI Tests

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: unit + integration ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: khanflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/khanflow_test
      NODE_ENV: test
      GOOGLE_CLIENT_ID: dummy_google_client_id
      GOOGLE_CLIENT_SECRET: dummy_google_client_secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/integration/google/callback
      GOOGLE_INTEGRATION_REDIRECT_URI: http://localhost:8000/api/integration/google/callback
      FRONTEND_INTEGRATION_URL: http://localhost:3000/integrations
      OPENAI_API_KEY: dummy_openai_key
      ANTHROPIC_API_KEY: dummy_anthropic_key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run database migrations
        run: npm run db:migrate

      - name: Create test results directory
        run: mkdir -p test-results

      - name: Run unit tests
        env:
          CI: true
        run: npm run test:unit

      - name: Run integration tests
        env:
          CI: true
        run: npm run test:integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results/junit.xml
          if-no-files-found: ignore

  # ── Frontend: type check + build + E2E ─────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./new-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: new-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_PUBLIC_APP_ORIGIN: http://localhost:3000
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key-for-ci-build
          OPENAI_API_KEY: placeholder-key-for-ci-build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_PUBLIC_APP_ORIGIN: http://localhost:3000
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key-for-ci-build
          OPENAI_API_KEY: placeholder-key-for-ci-build

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: new-frontend/playwright-report/
          if-no-files-found: ignore
